<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #050505;
    color: #f5f0e8;
    font-family: Georgia, "Times New Roman", serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 60px 20px;
  }

  .container { max-width: 800px; width: 100%; }

  .section-title {
    text-align: center;
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #5a5550;
    margin: 50px 0 20px;
    font-weight: 400;
  }

  .section-title:first-child { margin-top: 0; }

  .card {
    border: 1px solid rgba(245,240,232,0.06);
    border-radius: 4px;
    padding: 60px 20px;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .card-sm {
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 1px solid rgba(245,240,232,0.06);
    border-radius: 4px;
  }

  .card-footer {
    padding: 24px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 1px solid rgba(245,240,232,0.06);
    border-radius: 4px;
    flex-wrap: wrap;
    gap: 16px;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .nav-links { display: flex; gap: 24px; }
  .nav-links a {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #5a5550;
    text-decoration: none;
  }

  .tagline {
    font-size: 16px;
    font-style: italic;
    color: rgba(245,240,232,0.4);
    letter-spacing: 0.05em;
    text-align: center;
    margin-top: 40px;
  }

  .cta {
    display: inline-block;
    padding: 10px 28px;
    border: 1px solid rgba(245,240,232,0.15);
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(245,240,232,0.7);
    text-decoration: none;
    margin-top: 24px;
    transition: all 0.3s;
  }
  .cta:hover {
    border-color: rgba(245,240,232,0.3);
    color: #f5f0e8;
  }
</style>
